name: 유니패스 차수 동기화

on:
  schedule:
    # KST 평일 09:15 / 10:45 / 13:15 / 14:45 / 16:15 / 17:45  (6회/일)
    # GitHub Actions 무료 tier는 정각/인기 시간대 cron 누락/지연 잦음 → :15·:45로 분산
    - cron: "15 0 * * 1-5"     # KST 09:15  출근 직후 (야간 진행 확인)
    - cron: "45 1 * * 1-5"     # KST 10:45  오전 마무리 (점심 전)
    - cron: "15 4 * * 1-5"     # KST 13:15  점심 후 복귀
    - cron: "45 5 * * 1-5"     # KST 14:45  오후 중반
    - cron: "15 7 * * 1-5"     # KST 16:15
    - cron: "45 8 * * 1-5"     # KST 17:45  퇴근 직전 최종 확인
  workflow_dispatch:  # 수동 실행 버튼 활성화

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync_runner
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DS_ID: ${{ secrets.NOTION_DS_ID }}
          UNIPASS_PROXY_URL: ${{ secrets.UNIPASS_PROXY_URL }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/sync_runner.py
